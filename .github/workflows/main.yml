name: "TestAutomation Runner"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:   # allow manual trigger
    inputs:
      TestTags:
        description: "Enter Cucumber tag(s) to run"
        type: string
        required: true
        default: "@smoke"

jobs:
  run-tests:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Java environment
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Cache Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      # Step 4: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 5: Install json-server globally
      - name: Install json-server
        run: npm install -g json-server

      # Step 6: Reset database to a clean state
      - name: Reset database
        run: cp User.clean.json User.json

      # Step 7: Start json-server in background
      - name: Start json-server
        run: |
          json-server --watch User.json --port 3000 &
        shell: bash

      # Step 8: Run Maven tests with tags
      - name: Run Maven Tests
#        run: mvn clean test -Dcucumber.filter.tags="${{ github.event.inputs.TestTags }}"
        run: mvn clean test -Dtag="${{ github.event.inputs.TestTags }}"

      # Step 9: Upload Cucumber report (artifact)
      - name: Upload Cucumber report
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: Cucumber_Reports
          path: "target/cucumber-reports.html"


